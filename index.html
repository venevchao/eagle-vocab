<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#DDF0FE" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0B1826" media="(prefers-color-scheme: dark)">
<title>養鷹達人</title>
<style>
  *,*::before,*::after{box-sizing:border-box;touch-action:manipulation;}
  html,body{margin:0;padding:0;}
  h2,p{margin:0;}
  :root{
    --sky:#EAF5FD;        /* 天空底 */
    --card:#FFFFFF;
    --ink:#1C3A5E;        /* 墨藍主文字 */
    --ink2:#5B7C9E;       /* 次要文字 */
    --sun:#FFAB2E;        /* 陽光橘：主要行動 */
    --sun-d:#E89312;
    --grass:#3FBF77;      /* 答對綠 */
    --grass-d:#2E9C5E;
    --coral:#FF7A70;      /* 答錯珊瑚（柔和，不懲罰感） */
    --coral-d:#E05A50;
    --line:#CFE3F3;
    --chip:#DDEEFB;
    --gold:#F5B301;
    --gold-d:#D99400;
    --seal:linear-gradient(150deg,#FFCE5A,#F5A814);
    --teal:#1D86A6;       /* 中文語意強調色 */
    --r:18px;
  }
  html,body{height:100%;}
  body{
    background:linear-gradient(180deg,#DDF0FE 0%, var(--sky) 40%, #F2FAF3 100%);
    background-attachment:fixed;
    color:var(--ink);
    font-family:"PingFang TC","Heiti TC","Microsoft JhengHei",-apple-system,sans-serif;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
  }
  .en{font-family:ui-rounded,"SF Pro Rounded","Arial Rounded MT Bold","Comic Sans MS",-apple-system,sans-serif;}
  #app{max-width:680px;margin:0 auto;min-height:100vh;min-height:100dvh;
       display:flex;flex-direction:column;padding:0 16px;}
  header{display:flex;align-items:center;flex-wrap:wrap;gap:10px;padding:14px 2px 6px;}
  header .logo{font-size:22px;font-weight:800;letter-spacing:1px;margin-right:auto;}
  .hchip{background:var(--card);border:2px solid var(--line);border-radius:999px;
         padding:5px 12px;font-weight:700;font-size:15px;display:flex;align-items:center;gap:5px;
         font-variant-numeric:tabular-nums;}
  #sndBtn{cursor:pointer;user-select:none;}
  main{flex:1;padding:8px 0 96px;}
  nav{position:fixed;bottom:0;left:0;right:0;z-index:20;
      background:rgba(255,255,255,.96);border-top:2px solid var(--line);
      backdrop-filter:blur(6px);}
  nav .wrap{max-width:680px;margin:0 auto;display:flex;}
  nav button{flex:1;background:none;border:none;padding:10px 0 max(10px,env(safe-area-inset-bottom));
      font-size:13px;font-weight:700;color:var(--ink2);cursor:pointer;font-family:inherit;}
  nav button .ic{display:block;font-size:24px;margin-bottom:2px;filter:grayscale(.7);opacity:.75;}
  nav button.on{color:var(--ink);}
  nav button.on .ic{filter:none;opacity:1;}
  .card{background:var(--card);border:2px solid var(--line);border-radius:var(--r);
        padding:20px;box-shadow:0 3px 0 rgba(28,58,94,.06);}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
       font-family:inherit;font-weight:800;color:#fff;background:var(--sun);
       border:none;border-bottom:4px solid var(--sun-d);border-radius:16px;
       padding:14px 26px;font-size:19px;cursor:pointer;user-select:none;}
  .btn:active{transform:translateY(2px);border-bottom-width:2px;}
  .btn.green{background:var(--grass);border-bottom-color:var(--grass-d);}
  .btn.coral{background:var(--coral);border-bottom-color:var(--coral-d);}
  .btn.ghost{background:var(--card);color:var(--ink);border:2px solid var(--line);border-bottom-width:4px;}
  .btn.big{width:100%;padding:18px;font-size:22px;}
  .btn.sm{padding:9px 16px;font-size:16px;border-radius:12px;}
  .btn:disabled{opacity:.45;pointer-events:none;}
  h2{font-size:19px;font-weight:800;margin-bottom:10px;}
  .muted{color:var(--ink2);font-size:14px;line-height:1.6;}
  .ex{color:var(--ink);font-size:18px;font-weight:600;line-height:1.7;text-align:center;}

  /* 首頁 */
  .mascot{text-align:center;padding:14px 0 4px;}
  .mascot .bird{font-size:76px;line-height:1;display:inline-block;animation:bob 3s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .bubble{background:var(--card);border:2px solid var(--line);border-radius:16px;
          padding:10px 16px;display:inline-block;font-weight:700;margin-bottom:8px;font-size:16px;}
  .rank{font-weight:800;font-size:17px;margin-top:8px;}
  .ranknext{color:var(--ink2);font-size:13px;font-weight:700;margin-top:2px;}
  .statRow{display:flex;gap:10px;margin:14px 0;}
  .stat{flex:1;background:var(--card);border:2px solid var(--line);border-radius:var(--r);
        padding:12px 8px;text-align:center;}
  .stat .n{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;}
  .stat .l{font-size:13px;color:var(--ink2);font-weight:700;margin-top:2px;}
  .stat .n.grad{color:var(--gold);}
  .stat .n.grow{color:var(--grass-d);}
  .stat .n.egg{color:var(--ink2);}
  b.due,b.streak{font-weight:800;font-variant-numeric:tabular-nums;}
  b.due{color:var(--sun-d);}
  b.streak{color:var(--coral-d);}

  /* 練習 */
  .sesTop{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .pbar{flex:1;height:16px;background:#fff;border:2px solid var(--line);border-radius:999px;overflow:hidden;}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--sun),var(--gold));
          border-radius:999px;transition:width .35s;}
  .quit{background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink2);padding:4px;}
  .stage{min-height:340px;display:flex;flex-direction:column;}
  .prompt{font-size:17px;font-weight:800;color:var(--ink2);text-align:center;margin-bottom:14px;}
  .bigword{font-size:clamp(44px,10vw,66px);font-weight:800;text-align:center;
           letter-spacing:2px;margin:10px 0 6px;}
  .gloss{text-align:center;color:var(--teal);font-size:22px;font-weight:800;margin-bottom:8px;}
  .speak{display:block;margin:6px auto 14px;font-size:34px;background:var(--card);
         border:2px solid var(--line);border-bottom-width:4px;border-radius:50%;
         width:74px;height:74px;cursor:pointer;}
  .speak:active{transform:translateY(2px);}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .opt{font-family:inherit;background:var(--card);border:2px solid var(--line);border-bottom-width:4px;
       border-radius:16px;padding:18px 8px;font-size:26px;font-weight:800;color:var(--ink);
       cursor:pointer;user-select:none;}
  .opt:active{transform:translateY(2px);}
  .opt.ok{background:#E4F8ED;border-color:var(--grass);}
  .opt.ng{background:#FFEDEB;border-color:var(--coral);animation:shake .3s;}
  .slots{display:flex;justify-content:center;gap:var(--slotgap,7px);flex-wrap:nowrap;margin:8px 0 16px;min-height:56px;}
  .slot{width:var(--slotw,44px);height:54px;border-bottom:4px solid var(--line);border-radius:6px;
        background:rgba(255,255,255,.7);font-size:var(--slotf,32px);font-weight:800;text-align:center;
        line-height:52px;text-transform:lowercase;}
  .slot.fill{border-bottom-color:var(--sun);}
  .tiles{display:flex;justify-content:center;gap:9px;flex-wrap:wrap;}
  .tile{width:52px;height:56px;font-size:28px;font-weight:800;color:var(--ink);
        background:var(--card);border:2px solid var(--line);border-bottom-width:4px;border-radius:12px;
        cursor:pointer;user-select:none;font-family:ui-rounded,"SF Pro Rounded",sans-serif;}
  .tile:active{transform:translateY(2px);}
  .tile.used{opacity:.25;pointer-events:none;}
  .undo{margin:14px auto 0;display:block;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
  @media (prefers-reduced-motion:reduce){
    .mascot .bird,.opt.ng,.sendoff .bird,.zapPop,.zapBonus{animation:none;}
    .pbar i{transition:none;}
    .btn.micRec{animation:none;}
  }
  .fb{margin-top:auto;text-align:center;padding-top:16px;}
  .fb .msg{font-size:22px;font-weight:800;margin-bottom:12px;}
  .zapPop{font-size:58px;line-height:1;margin-bottom:2px;display:inline-block;
          animation:zapIn .55s cubic-bezier(.2,1.6,.4,1);filter:drop-shadow(0 0 12px rgba(245,179,1,.75));}
  @keyframes zapIn{0%{transform:scale(0) rotate(-30deg);opacity:0;}55%{transform:scale(1.35) rotate(8deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
  .zapBonus{display:inline-block;background:var(--seal);color:#fff;font-weight:800;font-size:16px;
            padding:6px 16px;border-radius:999px;margin-bottom:12px;
            box-shadow:0 3px 10px rgba(214,148,0,.45);animation:zapIn .55s .12s cubic-bezier(.2,1.6,.4,1) backwards;}
  .fb.ok .msg{color:var(--grass-d);}
  .fb.ng .msg{color:var(--coral-d);}
  .xpfloat{position:fixed;left:50%;top:38%;transform:translateX(-50%);
           font-size:30px;font-weight:800;color:var(--sun-d);pointer-events:none;
           animation:rise 1s forwards;z-index:30;}
  @keyframes rise{to{transform:translate(-50%,-70px);opacity:0;}}

  /* 錄音 */
  .micRow{margin:10px auto 0;text-align:center;}
  .exBig{font-size:clamp(24px,6vw,30px);font-weight:700;line-height:1.55;}
  .ghostHid{visibility:hidden;}
  .fbmsg{text-align:center;font-size:22px;font-weight:800;margin-top:6px;}
  .fbmsg.okc{color:var(--grass-d);}
  .fbmsg.ngc{color:var(--coral-d);}
  .micDone{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  .micBonus{color:var(--sun-d);}
  @keyframes micPulse{0%,100%{opacity:1}50%{opacity:.55}}
  .btn.micRec{animation:micPulse 1s ease-in-out infinite;}
  .echoRow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:4px;}

  /* 鳥園 */
  .aviGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:10px;}
  .aviCell{background:var(--card);border:2px solid var(--line);border-radius:14px;
           padding:10px 4px;text-align:center;cursor:pointer;user-select:none;position:relative;}
  .zap{position:absolute;top:3px;right:5px;font-size:14px;}
  .stagebar{display:flex;gap:6px;margin-bottom:6px;}
  .snode{flex:1;background:var(--card);border:2px solid var(--line);border-radius:14px;
         padding:8px 2px;text-align:center;cursor:pointer;user-select:none;font-family:inherit;}
  .snode .se{font-size:24px;display:block;line-height:1.2;}
  .snode .sc{font-size:16px;font-weight:800;display:block;font-variant-numeric:tabular-nums;color:var(--ink);}
  .snode .sn{font-size:11px;color:var(--ink2);font-weight:700;display:block;}
  .snode.on{border-color:var(--sun);background:#FFF6E5;}
  .snode.zero{opacity:.45;}
  .secHead{display:flex;align-items:baseline;gap:8px;margin:20px 0 8px;}
  .secHead .t{font-size:18px;font-weight:800;}
  .secHead .c{font-size:13px;color:var(--ink2);font-weight:700;}
  .aviCell .em{font-size:30px;}
  .aviCell .w{font-weight:800;font-size:15px;margin-top:3px;word-break:break-all;}
  .aviCell.grad{border-color:var(--gold);background:#FFF9E8;}
  .tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .tab{background:var(--chip);border:none;border-radius:999px;padding:8px 15px;
       font-family:inherit;font-weight:700;font-size:14px;color:var(--ink);cursor:pointer;}
  .tab.on{background:var(--ink);color:#fff;}

  /* 家長 */
  .prow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;
        border-bottom:1px solid var(--line);font-size:15px;}
  .prow:last-child{border-bottom:none;}
  .prow b{font-variant-numeric:tabular-nums;}
  textarea,select,input[type=text]{width:100%;font-family:inherit;font-size:16px;color:var(--ink);
        background:#fff;border:2px solid var(--line);border-radius:12px;padding:10px;}
  textarea{min-height:90px;resize:vertical;}
  .days{display:flex;gap:6px;align-items:flex-end;height:74px;margin-top:8px;}
  .day{flex:1;text-align:center;font-size:11px;color:var(--ink2);display:flex;
       flex-direction:column;justify-content:flex-end;gap:3px;height:100%;}
  .day i{display:block;background:var(--grass);border-radius:5px 5px 0 0;min-height:3px;margin:0 auto;width:70%;}
  .day.z i{background:var(--line);}

  /* 結算 */
  .sumWrap{text-align:center;padding-top:20px;}
  .sumWrap .big{font-size:56px;}
  .stars{font-size:44px;letter-spacing:6px;margin:6px 0;}
  .evolist{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0;}
  .evo{background:var(--card);border:2px solid var(--gold);border-radius:999px;
       padding:7px 14px;font-weight:800;font-size:16px;}
  .badgePop{background:#FFF9E8;border:2px solid var(--gold);border-radius:var(--r);
            padding:12px;margin:10px 0;font-weight:800;font-size:17px;}
  #cfx{position:fixed;inset:0;pointer-events:none;z-index:50;}
  .hid{display:none !important;}
  .mt{margin-top:14px;} .mtl{margin-top:22px;}
  .testbar{background:#6D28D9;color:#fff;text-align:center;font-weight:800;font-size:13px;
           padding:6px 10px;border-radius:0 0 12px 12px;}

  /* ===== 馴鷹祕笈 ===== */
  .mCover{text-align:center;padding:14px 0 6px;}
  .mCover .em{font-size:46px;line-height:1;filter:drop-shadow(0 3px 5px rgba(180,130,10,.35));}
  .mCover .ttl{font-size:29px;font-weight:800;letter-spacing:3px;margin-top:4px;}
  .mCover .sub{color:var(--ink2);font-weight:700;font-size:15px;margin-top:6px;}
  .divider{display:flex;align-items:center;gap:10px;margin:16px 2px 4px;color:var(--gold-d);}
  .divider::before,.divider::after{content:'';flex:1;height:2px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);}
  .divider .f{font-size:15px;}
  .vol{background:var(--card);border:2px solid var(--line);border-radius:var(--r);
       padding:18px 18px 20px;box-shadow:0 3px 0 rgba(28,58,94,.06);margin-top:16px;}
  .volHead{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .seal{width:46px;height:46px;flex:none;border-radius:14px;background:var(--seal);
        display:grid;place-items:center;color:#fff;font-weight:700;font-size:19px;letter-spacing:1px;
        font-family:"Copperplate","Copperplate Gothic Light","Trajan Pro",Georgia,serif;
        text-shadow:0 1px 1px rgba(140,90,10,.5);
        box-shadow:0 3px 8px rgba(214,148,0,.4),inset 0 0 0 2px rgba(255,255,255,.35);}
  .eyebrow{font-size:12px;font-weight:800;letter-spacing:3px;color:var(--gold-d);}
  .vt{font-size:20px;font-weight:800;line-height:1.2;}
  .lede{font-size:17px;font-weight:800;line-height:1.6;color:var(--ink2);margin-bottom:14px;}
  .hl{background:linear-gradient(transparent 58%,rgba(245,179,1,.42) 58%);padding:0 2px;border-radius:2px;}
  .evoLadder{position:relative;margin:2px 0 8px;}
  .evoLadder::before{content:'';position:absolute;left:22px;top:26px;bottom:30px;width:3px;
      background:linear-gradient(var(--line),var(--gold));border-radius:3px;z-index:0;}
  .evoRow{display:flex;align-items:center;gap:13px;padding:6px 0;position:relative;z-index:1;}
  .evoDot{width:46px;height:46px;flex:none;border-radius:50%;display:grid;place-items:center;
          font-size:25px;background:var(--chip);border:2px solid var(--line);}
  .evoName{font-weight:800;font-size:16px;}
  .evoPill{margin-left:auto;background:var(--chip);color:var(--ink2);font-weight:700;
           font-size:13px;padding:5px 13px;border-radius:999px;white-space:nowrap;}
  .evoRow.eagle .evoDot{background:var(--seal);border-color:var(--gold);
      box-shadow:0 0 0 5px rgba(245,179,1,.18);}
  .evoRow.eagle .evoName{color:var(--gold-d);}
  .evoRow.eagle .evoPill{background:var(--seal);color:#fff;}
  .note{color:var(--ink2);font-size:13px;font-weight:700;margin-top:6px;text-align:center;}
  .note .f{color:var(--gold-d);margin-right:4px;}
  .say{font-size:16px;font-weight:600;line-height:1.75;color:var(--ink);}
  .promise{margin-top:14px;background:linear-gradient(135deg,rgba(63,191,119,.14),rgba(29,134,166,.12));
           border:2px solid rgba(63,191,119,.35);border-radius:14px;padding:13px 15px;
           font-weight:800;font-size:16px;line-height:1.6;text-align:center;}
  .sublabel{font-size:15px;font-weight:800;letter-spacing:.5px;color:var(--ink);
            margin:6px 0 9px;display:flex;align-items:center;gap:6px;}
  .earn{display:flex;justify-content:space-between;align-items:center;padding:8px 0;
        border-bottom:1px dashed var(--line);font-size:15px;font-weight:600;}
  .earn:last-child{border-bottom:none;}
  .earn b{font-variant-numeric:tabular-nums;color:var(--gold-d);font-size:16px;white-space:nowrap;}
  .ladder{margin-top:8px;border-radius:14px;overflow:hidden;border:2px solid var(--line);
          background:linear-gradient(180deg,transparent 55%,rgba(245,179,1,.10));}
  .tier{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(--line);}
  .tier:last-child{border-bottom:none;}
  .tier .st{font-size:16px;width:20px;text-align:center;flex:none;}
  .tier .lv{font-size:12px;font-weight:800;color:var(--ink2);font-variant-numeric:tabular-nums;width:36px;flex:none;}
  .tier .tn{font-weight:800;font-size:15px;}
  .tier .req{margin-left:auto;font-size:12px;font-weight:700;color:var(--ink2);
             font-variant-numeric:tabular-nums;white-space:nowrap;}
  .tier.done{opacity:.6;}
  .tier.done .tn{font-weight:700;}
  .tier.here{background:linear-gradient(90deg,rgba(245,179,1,.22),rgba(245,179,1,.06));
             box-shadow:inset 3px 0 0 var(--gold);}
  .tier.here .tn{color:var(--gold-d);}
  .tier.here .youAre{margin-left:6px;font-size:11px;font-weight:800;color:#fff;
             background:var(--gold-d);padding:2px 7px;border-radius:999px;vertical-align:middle;}
  .tier.summit{background:linear-gradient(90deg,rgba(245,179,1,.24),rgba(29,134,166,.13));}
  .tier.summit .tn{color:#0A6F92;}
  .medalRow{display:flex;gap:9px;justify-content:center;margin-top:12px;}
  .medalBox{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:24px;
        background:var(--chip);border:2px solid var(--line);}
  .medalBox.on{background:linear-gradient(150deg,#FFF3D0,#FFE49E);border-color:var(--gold);}
  .medalBox.off{opacity:.5;}
  .sendoff{margin-top:16px;text-align:center;padding:26px 20px;border-radius:var(--r);color:#4A2E14;
           background:linear-gradient(135deg,#F0D48E 0%,#D8B063 32%,#B58A46 64%,#8A6535 100%);
           border:2px solid rgba(150,105,50,.5);
           box-shadow:0 8px 20px rgba(120,85,35,.35),inset 0 0 0 1px rgba(255,240,205,.4),inset 0 -3px 7px rgba(120,80,35,.28);}
  .sendoff .bird{font-size:44px;display:block;margin-bottom:8px;animation:soar 3.5s ease-in-out infinite;
                 filter:drop-shadow(0 2px 3px rgba(90,60,25,.4));}
  .sendoff .line{font-size:20px;font-weight:800;line-height:1.5;letter-spacing:.5px;
                 text-shadow:0 1px 0 rgba(255,245,215,.4);}
  @keyframes soar{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-9px) rotate(4deg);}}

  /* ===== 夜間鳥園（跟隨系統外觀） ===== */
  @media (prefers-color-scheme: dark){
    :root{
      --sky:#0F1E2E; --card:#1A2B3E; --ink:#E9F1FA; --ink2:#9DB3CA;
      --sun:#FFAB2E; --sun-d:#B87E12; --grass:#45C87E; --grass-d:#2E9C5E;
      --coral:#FF8A80; --coral-d:#D9645A; --line:#2C4155; --chip:#233850;
      --gold:#FFC53D; --gold-d:#FFD46A; --teal:#6BCBE0;
    }
    body{background:linear-gradient(180deg,#0B1826 0%,#102132 45%,#12271F 100%);background-attachment:fixed;}
    nav{background:rgba(13,23,36,.96);}
    .pbar{background:var(--card);}
    .slot{background:rgba(255,255,255,.07);}
    .snode.on{background:#33290F;}
    .opt.ok{background:#173325;}
    .opt.ng{background:#3A2126;}
    .badgePop,.aviCell.grad{background:#2E2609;}
    textarea,select,input[type=text]{background:var(--card);}
    .promise{background:linear-gradient(135deg,rgba(69,200,126,.16),rgba(107,203,224,.14));}
    .medalBox.on{background:linear-gradient(150deg,#3a3011,#4a3c12);}
    .tier.summit .tn{color:#83DAEE;}
  }
</style>
</head>

function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(ds,n){const d=new Date(ds+'T12:00:00');d.setDate(d.getDate()+n);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function dayDiff(a,b){return Math.round((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/86400000);}
function missDays(){const st=db.stats;if(!st.lastDay)return 0;return Math.max(0,dayDiff(st.lastDay,today())-1);}

/* ================= 音效（WebAudio 合成） ================= */
let AC=null;
function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(AC&&AC.state!=='running'){try{AC.resume();}catch(e){}} return AC;}
/* iOS 音訊路由喚醒：播一小段近乎無聲的音檔，把音訊 session 推到播放狀態，

function audioKick(){

function tone(f,t0,dur,type,vol){const c=ac();if(!c||!db.sound)return;
  const o=c.createOscillator(),g=c.createGain();
  o.type=type||'sine';o.frequency.value=f;
  g.gain.setValueAtTime(0.0001,c.currentTime+t0);
  g.gain.exponentialRampToValueAtTime(vol||.25,c.currentTime+t0+.02);
  g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+t0+dur);
  o.connect(g);g.connect(c.destination);
  o.start(c.currentTime+t0);o.stop(c.currentTime+t0+dur+.05);}
const sfx={

let VOICE=null;
function pickVoice(){
  const vs=window.speechSynthesis?speechSynthesis.getVoices():[];
  VOICE=vs.find(v=>/en[-_]US/i.test(v.lang)&&/Samantha|Ava|Allison/i.test(v.name))
       ||vs.find(v=>/en[-_]US/i.test(v.lang))||vs.find(v=>/^en/i.test(v.lang))||null;
}
if(window.speechSynthesis){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;}
/* 語音診斷：環形紀錄最近 40 筆 TTS 事件（獨立 key，不進進度備份），供 iPad 無聲問題排錯 */
const TTSLOG_KEY='word-birds-ttslog';
function ttsLog(ev,txt){
  try{
    const a=JSON.parse(localStorage.getItem(TTSLOG_KEY)||'[]');
    a.push({t:new Date().toTimeString().slice(0,8),ev,txt:String(txt).slice(0,18),
      v:(speechSynthesis.getVoices()||[]).length,p:speechSynthesis.paused?1:0,s:speechSynthesis.speaking?1:0});
    if(a.length>40)a.splice(0,a.length-40);
    localStorage.setItem(TTSLOG_KEY,JSON.stringify(a));
  }catch(e){}
}
function speak(text,rate,onend){
  if(!window.speechSynthesis)return;
  micStopPlay();   /* TTS 開口前先停掉自錄音播放，避免重疊 */
  try{if(speechSynthesis.paused)speechSynthesis.resume();}catch(e){}  /* iOS 偶發卡在 paused 狀態 */
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US'; if(VOICE)u.voice=VOICE; u.rate=rate||0.85; u.pitch=1.05;
  if(onend)u.onend=onend;
  u.onstart=()=>ttsLog('start',text);
  u.onerror=e=>ttsLog('error:'+(e&&e.error||'?'),text);
  ttsLog('call',text);
  /* iOS Safari：cancel 後立刻 speak 偶爾被吞，隔一拍再說 */
  setTimeout(()=>{try{speechSynthesis.speak(u);}catch(e){ttsLog('throw',text);}},60);
}

/* ================= 錄音（麥克風，全部可選、絕不擋路） ================= */
let MIC_REC=null, MIC_CHUNKS=[], MIC_BLOCKED=false, MIC_DISCARD=false;
const MIC_CLIPS={}, MIC_META={};
function micSupported(){
  return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder) && !MIC_BLOCKED;
}
function micSetup(id,box,label,bonus,onDone,playLabel){MIC_META[id]={box,label,bonus,onDone,playLabel:playLabel||'▶️ 聽我錄的'};}
function micWidgetHTML(id){
  const m=MIC_META[id]||{label:'🎙️ 錄音',playLabel:'▶️ 聽我錄的'};
  const c=MIC_CLIPS[id];
  if(c&&c.recording)return `<button class="btn coral sm micRec" onclick="micStop('${id}')">⏺️ 錄音中…（按這裡停止）</button>`;
  if(c&&c.url)return `<div class="micDone">
      <button class="btn ghost sm" onclick="micPlay('${id}')">${m.playLabel}</button>
      <button class="btn ghost sm" onclick="micStart('${id}')">🔁 重錄</button>
    </div>`;
  const btn=`<button class="btn ghost sm" onclick="micStart('${id}')">${m.label}${m.bonus?` <b class="micBonus">${m.bonus}</b>`:''}</button>`;
  /* 權限被拒／裝置無麥克風：按鈕保留可重試，只是多一行提示（不永久隱藏） */
  if(c&&c.denied)return btn+'<p class="muted" style="margin-top:4px">🎙️ 錄音權限未開啟——到系統設定開啟麥克風後可重試</p>';
  return btn;
}
function micRenderInto(id){
  const meta=MIC_META[id]; if(!meta)return;
  const box=el(meta.box); if(!box)return;
  box.innerHTML=micWidgetHTML(id);
}
async function micStart(id){
  if(MIC_REC)return;   /* 同時只能錄一個 */
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const okType=t=>window.MediaRecorder&&MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported(t);
    const mime=okType('audio/mp4')?'audio/mp4':okType('audio/webm')?'audio/webm':'';
    MIC_REC=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);
    MIC_CHUNKS=[];
    MIC_REC.ondataavailable=e=>{if(e.data&&e.data.size)MIC_CHUNKS.push(e.data);};
    MIC_REC.onstop=()=>{
      stream.getTracks().forEach(t=>t.stop());
      MIC_REC=null;
      /* 換頁強制停止的錄音直接丟棄——不入庫、不渲染、不加分，杜絕跨卡幽靈音檔 */
      if(MIC_DISCARD){MIC_DISCARD=false;delete MIC_CLIPS[id];return;}
      const blob=new Blob(MIC_CHUNKS,{type:(MIC_CHUNKS[0]&&MIC_CHUNKS[0].type)||'audio/mp4'});
      if(MIC_CLIPS[id]&&MIC_CLIPS[id].url)URL.revokeObjectURL(MIC_CLIPS[id].url);
      MIC_CLIPS[id]={url:URL.createObjectURL(blob),recording:false};
      micRenderInto(id);
      const meta=MIC_META[id];
      if(meta&&meta.onDone)meta.onDone();
    };
    MIC_CLIPS[id]={recording:true,url:(MIC_CLIPS[id]&&MIC_CLIPS[id].url)||null};
    MIC_REC.start();
    micRenderInto(id);
  }catch(e){
    /* 權限被拒／裝置無麥克風（如 iPad Chrome 系統層權限未開）：不永久封鎖，
       這一顆按鈕保留可重試、顯示提示，其他一切照常。只有真的沒有錄音 API 才整批隱藏，
       但那種情況 micSupported() 早在按鈕出現前就攔下了，此處只是防禦性保底。 */
    const denyNames=['NotAllowedError','PermissionDeniedError','SecurityError','NotFoundError','NotReadableError'];
    if(e&&denyNames.includes(e.name)){
      MIC_CLIPS[id]={recording:false,denied:true,url:(MIC_CLIPS[id]&&MIC_CLIPS[id].url)||null};
      micRenderInto(id);
    }else{
      MIC_BLOCKED=true;
      micHideAll();
    }
  }
}
function micStop(id){if(MIC_REC&&MIC_REC.state==='recording')MIC_REC.stop();}
let MIC_AUDIO=null;
function micStopPlay(){if(MIC_AUDIO){try{MIC_AUDIO.pause();}catch(e){}MIC_AUDIO=null;}}
function micPlay(id){const c=MIC_CLIPS[id];if(!c||!c.url)return;
  micStopPlay();
  try{speechSynthesis.cancel();}catch(e){}   /* 聽自己的錄音時，也停掉還在唸的 TTS */
  MIC_AUDIO=new Audio(c.url);MIC_AUDIO.play();}
function micHas(id){return !!(MIC_CLIPS[id]&&MIC_CLIPS[id].url);}
function micClear(id){if(MIC_CLIPS[id]&&MIC_CLIPS[id].url)URL.revokeObjectURL(MIC_CLIPS[id].url);delete MIC_CLIPS[id];}
function micHideAll(){document.querySelectorAll('.micRow').forEach(e=>e.classList.add('hid'));}

/* ================= 工具 ================= */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function el(id){return document.getElementById(id);}
function reduceMotion(){return window.matchMedia('(prefers-reduced-motion: reduce)').matches;}

/* ================= 每日出題器 ================= */
function buildQueue(){
  const words=allWords(), t=today();
  const due=words.filter(x=>prog(x.w).intro&&prog(x.w).due<=t&&!isGrad(x));
  due.sort((a,b)=>prog(a.w).lv-prog(b.w).lv||Math.random()-.5);
  const reviews=due.slice(0,REVIEW_CAP);
  /* 複習債多時自動少上新字（習慣優先於進度） */
  const newN=due.length>25?0:due.length>15?2:NEW_CAP;
  const fresh_=words.filter(x=>!prog(x.w).intro).slice(0,newN);
  let q=shuffle(reviews.slice()).map(x=>({x,type:cardType(x),tries:0}));
  /* 已畢業的字：抽 2 個回鍋——有例句且麥克風可用時升級成句子回音卡，否則退回一般快問快答 */
  const grads=shuffle(words.filter(isGrad)).slice(0,2);
  grads.forEach(x=>q.splice(Math.floor(Math.random()*(q.length+1)),0,{x,type:'echoCandidate',tries:0,bonus:1}));
  /* 新字：介紹卡 + 緊接一張辨識卡 */
  fresh_.forEach(x=>{
    const pos=Math.floor(Math.random()*(q.length+1));
    q.splice(pos,0,{x,type:'intro',tries:0});
    q.splice(Math.min(pos+3,q.length),0,{x,type:'choose',tries:0,followup:1});
  });
  return q;
}
function cardType(x){
  const p=prog(x.w), r=Math.random();
  if(x.tier==='recognize')return 'choose';
  if(x.tier==='familiar'&&p.lv<=2)return r<.6?'choose':'spell';
  /* master／高階 familiar：主攻產出 —— 聽音拼字、看字唸出 */
  return r<.5?'spell':'say';
}

/* ================= 練習 Session ================= */
let S=null;

/* 場次斷點續練：每答一題就把佇列快照存進 localStorage，
   誤觸分頁、重新整理、關掉 Safari 都能從原題續練（毀滅動力級干擾的解方） */
function serializeSession(){
  if(!S)return;
  try{
    localStorage.setItem(KEY+'-session',JSON.stringify({
      d:today(),i:S.i,firstOk:S.firstOk,firstNg:S.firstNg,xp:S.xp,
      freeplay:S.freeplay?1:0,rank0:S.rank0,evolved:S.evolved,
      chal:S.chalGiven?[...S.chalGiven]:[],
      q:S.q.map(it=>({w:it.x.w,type:it.type==='echo'?'echoCandidate':it.type,
        tries:it.tries||0,bonus:it.bonus?1:0,followup:it.followup?1:0}))
    }));
  }catch(e){}
}
function clearSessionSave(){try{localStorage.removeItem(KEY+'-session');}catch(e){}}
function peekSession(){
  try{
    const d=JSON.parse(localStorage.getItem(KEY+'-session')||'null');
    if(!d||d.d!==today()||!d.q||d.i>=d.q.length)return null;
    return {at:d.i+1,len:d.q.length};
  }catch(e){return null;}
}
function restoreSession(){
  try{
    const d=JSON.parse(localStorage.getItem(KEY+'-session')||'null');
    if(!d||d.d!==today()||!d.q||d.i>=d.q.length)return null;
    const map={}; allWords().forEach(x=>map[x.w.toLowerCase()]=x);
    const q=[];
    for(const it of d.q){
      const x=map[it.w.toLowerCase()]; if(!x)return null;
      q.push({x,type:it.type,tries:it.tries,bonus:it.bonus?1:0,followup:it.followup});
    }
    return {q,i:d.i,total:q.length,firstOk:d.firstOk,firstNg:d.firstNg,xp:d.xp,
      evolved:d.evolved||[],newBadges:[],rank0:d.rank0,freeplay:!!d.freeplay,
      chalGiven:new Set(d.chal||[])};
  }catch(e){return null;}
}
function startSession(){
  ac(); sfx.tap(); audioKick();
  /* iOS Safari：TTS 需在使用者手勢中先解鎖一次，之後才能自動發音 */
  if(window.speechSynthesis){const u=new SpeechSynthesisUtterance(' ');u.volume=0;speechSynthesis.speak(u);}
  /* 有今日未完成的場次快照就續練，不重建佇列 */
  const saved=restoreSession();
  if(saved){S=saved;renderCard();return;}
  const q=buildQueue();
  if(!q.length){el('view').innerHTML='<div class="card"><h2>沒有可以練的字！</h2><p class="muted">請家長先在「家長」頁新增單字。</p></div>';return;}
  /* 當日已達標後的加練＝自由練習：鳥兒等級照算，星星不計（與家長口頭規則一致，也是天梯速度的閥門） */
  const doneToday=!!(db.stats.days[today()]&&db.stats.days[today()].goal);
  S={q,i:0,total:q.length,firstOk:0,firstNg:0,xp:0,evolved:[],newBadges:[],rank0:rankIdx(db.stats.xp),freeplay:doneToday};
  serializeSession();
  renderCard();
}
function renderCard(){
  if(!S||S.i>=S.q.length){finishSession();return;}
  const item=S.q[S.i], x=item.x;
  if(item.type==='echoCandidate')item.type=(x.s&&micSupported())?'echo':cardType(x);
  const pct=Math.round(S.i/S.q.length*100);
  let inner='';
  if(item.type==='intro')inner=introCard(x);
  else if(item.type==='choose')inner=chooseCard(x);
  else if(item.type==='spell')inner=spellCard(x);
  else if(item.type==='echo')inner=echoCard(x);
  else inner=sayCard(x);
  el('view').innerHTML=`
    <div class="sesTop">
      <button class="quit" onclick="quitSession()" aria-label="離開">✕</button>
      <div class="pbar"><i style="width:${pct}%"></i></div>
      <span class="hchip">${S.i+1}/${S.q.length}</span>
    </div>
    <div class="card stage" id="stage">${inner}</div>`;
  if(item.type==='choose')setTimeout(()=>speak(x.w),350);
  if(item.type==='spell')setTimeout(()=>speak(x.w),350);
  if(item.type==='intro')setTimeout(()=>{speak(x.w);},350);
  if(item.type==='echo')setTimeout(()=>speak(x.s,0.9),350);
}
function quitSession(){
  go('home');   /* go() 內建的場次守衛會負責確認與保存 */
}

/* ---- 卡片：聽音選字 ---- */
function chooseCard(x){
  const pool=allWords().filter(o=>o.w!==x.w);
  pool.sort((a,b)=>(sim(b.w,x.w)-sim(a.w,x.w))||Math.random()-.5);
  const opts=shuffle([x.w].concat(pool.slice(0,3).map(o=>o.w)));
  return `<div class="prompt">👂 聽一聽，是哪個字？</div>
    <button class="speak" onclick="speak('${esc(x.w)}');sfx.tap()">🔊</button>
    <div class="opts">${opts.map(w=>`<button class="opt en" data-w="${esc(w)}" onclick="pickOpt(this)">${esc(w)}</button>`).join('')}</div>
    <div class="fb" id="fb"></div>`;
}
function sim(a,b){let s=0;if(a[0]===b[0])s+=2;if(Math.abs(a.length-b.length)<=1)s+=1;if(a.slice(-1)===b.slice(-1))s+=1;return s;}
function pickOpt(btn){
  const item=S.q[S.i], x=item.x, w=btn.dataset.w;
  document.querySelectorAll('.opt').forEach(b=>b.style.pointerEvents='none');
  if(w===x.w){btn.classList.add('ok');answer(true);}
  else{btn.classList.add('ng');
    document.querySelectorAll('.opt').forEach(b=>{if(b.dataset.w===x.w)b.classList.add('ok');});
    answer(false);}
}

/* ---- 卡片：聽音拼字 ---- */
let SP=null;
function spellCard(x){
  const letters=x.w.split('');
  const decoys='abcdefghijklmnopqrstuvwxyz'.split('').filter(c=>!x.w.toLowerCase().includes(c));
  const decoyN=x.w.length<6?2:3;   /* N<6 給 +2、N>=6 給 +3；N>9 不再加碼，見決策紀錄 */
  const tiles=shuffle(letters.concat(shuffle(decoys).slice(0,decoyN)));
  SP={ans:[],tiles,t0:null,undo:0};   /* t0 於第一次按字母磚時才起算（排除聽音與思考時間） */
  /* 長字（N>6）縮小格子與字級，讓拼字結果永遠排成單行，不會斷成兩行 */
  const n=letters.length;
  const slotw=n<=6?44:n<=8?36:n<=10?30:24;
  const slotf=n<=6?32:n<=8?26:n<=10?22:18;
  const slotgap=n<=6?7:4;
  return `<div class="prompt">👂 聽一聽，拼出這個字！</div>
    <button class="speak" onclick="speak('${esc(x.w)}');sfx.tap()">🔊</button>
    <div class="gloss">${esc(x.zh||'')}</div>
    <div class="slots" id="slots" style="--slotw:${slotw}px;--slotf:${slotf}px;--slotgap:${slotgap}px">${letters.map(()=>'<div class="slot"></div>').join('')}</div>
    <div class="tiles" id="tiles">${tiles.map((c,i)=>`<button class="tile" id="t${i}" onclick="tapTile(${i})">${esc(c.toLowerCase())}</button>`).join('')}</div>
    <button class="btn ghost sm undo" onclick="undoTile()">⌫ 退一格</button>
    <div class="fb" id="fb"></div>`;
}
function tapTile(i){
  const x=S.q[S.i].x;
  if(!SP||SP.ans.length>=x.w.length)return;
  if(!SP.t0)SP.t0=Date.now();   /* 秒殺計時從第一次按磚起算 */
  sfx.tap();
  SP.ans.push(i); el('t'+i).classList.add('used'); paintSlots();
  if(SP.ans.length===x.w.length){
    const got=SP.ans.map(j=>SP.tiles[j]).join('');
    const ok=got.toLowerCase()===x.w.toLowerCase();
    /* 順暢度 Phase 2 門檻（2026-07-13 校正）：從第一磚到完成，零退格＋每字母 0.9 秒＋1.5 秒緩衝 */
    const ms=Date.now()-SP.t0, item=S.q[S.i];
    item.fluent=ok&&SP.undo===0&&ms<=1500+900*x.w.length;
    if(!db.stats.spellLog)db.stats.spellLog=[];
    db.stats.spellLog.push({w:x.w.toLowerCase(),ms,un:SP.undo,ok:ok?1:0,fl:item.fluent?1:0,d:today()});
    if(db.stats.spellLog.length>300)db.stats.spellLog.splice(0,db.stats.spellLog.length-300);
    if(!ok)el('slots').style.animation='shake .3s';
    answer(ok);
  }
}
function undoTile(){
  if(!SP||!SP.ans.length)return;
  SP.undo++;
  const i=SP.ans.pop(); el('t'+i).classList.remove('used'); paintSlots(); sfx.tap();
}
function paintSlots(){
  const slots=el('slots').children;
  for(let k=0;k<slots.length;k++){
    const has=k<SP.ans.length;
    slots[k].textContent=has?SP.tiles[SP.ans[k]].toLowerCase():'';
    slots[k].classList.toggle('fill',has);
  }
}

/* ---- 作答結算 ---- */
function answer(ok){
  const item=S.q[S.i], x=item.x, p=prog(x.w);
  const first=item.tries===0;
  if(ok){
    (item.fluent&&first)?sfx.zap():sfx.ok(); p.ok++;
    if(first){
      S.firstOk++;
      let gain=item.bonus?XP_RETRY:XP_HIT;
      if(item.fluent&&!item.bonus)gain+=2;   /* ⚡ 秒殺獎勵 */
      addXp(gain);
      const before=isGrad(x)?'🦅':STAGE[Math.min(p.lv,5)];
      if(!item.bonus){p.lv=Math.min(p.lv+1,MAXLV[x.tier]);p.due=addDays(today(),INTERVALS[Math.min(p.lv,INTERVALS.length-1)]);}
      const after=isGrad(x)?'🦅':STAGE[Math.min(p.lv,5)];
      if(before!==after){S.evolved.push({w:x.w,em:after});setTimeout(()=>sfx.up(),350);}
    }else{addXp(XP_RETRY);}
  }else{
    sfx.ng(); p.ng++;
    if(first){
      S.firstNg++;
      p.lv=Math.max(1,p.lv-1); p.due=today();          /* 降一級、明天前再出現 */
      if(item.tries<2){const re={x,type:item.type==='say'?'say':cardType(x),tries:item.tries+1};S.q.push(re);}
    }else if(item.tries<2){S.q.push({x,type:item.type,tries:item.tries+1});}
  }
  save();
  serializeSession();
  if(item.type==='say'&&x.s)sentenceBeat(ok,x);
  else showFeedback(ok,x,first,item.type);
}

/* ---- Session 結束 ---- */
function finishSession(){
  micForceStopIfActive(); micStopPlay(); micResetAll(); clearSessionSave();
  const t=today(), st=db.stats;
  const rec=st.days[t]||{ok:0,ng:0,n:0,goal:false};
  rec.ok+=S.firstOk; rec.ng+=S.firstNg; rec.n+=S.firstOk+S.firstNg;
  const firstGoalToday=!rec.goal;
  rec.goal=true; st.days[t]=rec;
  let medalUsed=0, medalEarned=false;
  if(firstGoalToday){
    if(!st.lastDay)st.streak=1;
    else if(st.lastDay!==t){
      const gap=dayDiff(st.lastDay,t);
      if(gap===1)st.streak++;
      else{
        const missed=gap-1;
        if(st.shields>=missed){st.shields-=missed;medalUsed=missed;st.streak++;}
        else st.streak=1;
      }
    }
    st.lastDay=t;
    if(st.streak>st.best)st.best=st.streak;
    if(st.streak%MEDAL_EVERY===0&&st.shields<MEDAL_MAX){st.shields++;medalEarned=true;}
  }
  const acc=S.firstOk+S.firstNg?S.firstOk/(S.firstOk+S.firstNg):1;
  const stars=acc>=0.9?3:acc>=0.7?2:1;
  checkBadges(acc);
  save(); setHeader();
  el('view').innerHTML=`
    <div class="sumWrap">
      <div class="big">${stars===3?'🏆':stars===2?'🎉':'💪'}</div>
      <h2 style="font-size:26px">今天的練習完成！</h2>
      <div class="stars">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
      <p class="muted">答對 ${S.firstOk} 題 ・ 再挑戰 ${S.firstNg} 題 ・ ${S.freeplay?'自由練習，鳥兒升級照算':'獲得 '+S.xp+' ⭐'}</p>

      ${medalUsed?`<div class="badgePop">${MEDAL} ${MEDAL_NAME}替你飛過了休息的那 ${medalUsed} 天，連續紀錄守住了！</div>`:''}
      ${medalEarned?`<div class="badgePop">${MEDAL} 連續 ${db.stats.streak} 天！獲得一枚${MEDAL_NAME}（目前 ${db.stats.shields} 枚）</div>`:''}
      ${S.newBadges.map(b=>`<div class="badgePop">🏅 得到徽章：${esc(b)}</div>`).join('')}
      <p style="font-weight:800;font-size:18px" class="mt">🔥 連續 ${db.stats.streak} 天！明天也要來喔！</p>
      <button class="btn big mt" onclick="S=null;go('avi')">去鳥園看看 🐦</button>
      <button class="btn ghost big mt" onclick="S=null;go('home')">回首頁 🏠</button>

const BADGES={first:'第一次練習！',s3:'連續 3 天 🔥',s7:'連續 7 天 🔥🔥',s14:'連續 14 天 🔥🔥🔥',
  g10:'10 隻雄鷹 🦅',g50:'50 隻雄鷹 🦅🦅',perfect:'全對場！'};
function checkBadges(acc){
  const has=db.stats.badges, add=k=>{if(!has.includes(k)){has.push(k);S.newBadges.push(BADGES[k]);}};

}

/* ---- 彩帶 ---- */
function confetti(){
  const c=el('cfx'),x=c.getContext('2d');
  c.width=innerWidth;c.height=innerHeight;
  const P=[];const cols=['#FFAB2E','#3FBF77','#5BB8F5','#FF7A70','#F5B301'];
  for(let i=0;i<120;i++)P.push({x:Math.random()*c.width,y:-20-Math.random()*c.height*.5,
    v:2+Math.random()*3,r:4+Math.random()*5,a:Math.random()*6.28,col:cols[i%5]});
  let n=0;
  (function tick(){
    x.clearRect(0,0,c.width,c.height);
    P.forEach(p=>{p.y+=p.v;p.a+=.1;x.save();x.translate(p.x,p.y);x.rotate(p.a);
      x.fillStyle=p.col;x.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.6);x.restore();});
    if(++n<130)requestAnimationFrame(tick);else x.clearRect(0,0,c.width,c.height);
  })();
}

/* ================= 頑固字排行（P2）================= */
/* 綜合計分：答錯×3 ＋ 拼字失手×2 ＋ 退格×1 ＋ 平均超過 12 秒 +1；score>=2 才上榜 */
function stubbornList(){
  const agg={};
  (db.stats.spellLog||[]).forEach(e=>{
    const a=agg[e.w]||(agg[e.w]={ms:0,n:0,un:0,fail:0});
    a.n++;a.ms+=e.ms;a.un+=e.un;if(!e.ok)a.fail++;
  });
  const rows=[];
  allWords().forEach(x=>{
    const p=db.progress[x.w.toLowerCase()];
    if(!p||!p.intro)return;
    const a=agg[x.w.toLowerCase()]||{ms:0,n:0,un:0,fail:0};
    const avg=a.n?a.ms/a.n:0;
    const score=(p.ng||0)*3+a.fail*2+a.un+(avg>12000?1:0);
    if(score>=2)rows.push({w:x.w,score,ng:p.ng||0,fail:a.fail,un:a.un,avg:a.n?Math.round(avg/100)/10:0});
  });
  rows.sort((a,b)=>b.score-a.score);
  return rows.slice(0,8);
}

    <div class="card mt">
      <h2>➕ 新增單字</h2>
      <p class="muted" style="margin-bottom:8px">貼上單字（逗號、空格、換行分隔皆可）。建議流程：把講義拍照傳給 Claude 並註明目標層級，由 Claude 轉錄、配中文與例句後更新 App；這裡的手動新增是備援（不含中文與例句）。</p>
      <textarea id="impTxt" placeholder="例如：high, every, near, add, food..."></textarea>
      <div class="mt" style="display:flex;gap:10px;align-items:center">
        <select id="impTier" style="flex:1">
          <option value="familiar">目標：熟悉（溫和起步→產出）</option>
          <option value="recognize">目標：認識（聽音辨識）</option>
          <option value="master">目標：熟用（完整產出）</option>
        </select>
        <button class="btn sm" onclick="importWords()">匯入</button>
      </div>
      <p class="muted mt" id="impMsg"></p>
    </div>

    <div class="card mt">
      <h2>💾 進度備份</h2>
      <p class="muted" style="margin-bottom:8px">進度存在此裝置的瀏覽器中。換裝置前請「匯出」，把文字貼到新裝置「匯入」。</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn ghost sm" onclick="exportData()">匯出進度</button>
        <button class="btn ghost sm" onclick="importDataUI()">匯入進度</button>
        <button class="btn coral sm" onclick="resetAll()">全部重設</button>
      </div>
      <textarea id="ioBox" class="mt hid" placeholder="匯出的進度文字會出現在這裡；匯入時把備份文字貼進來再按確認。"></textarea>
      <button class="btn sm mt hid" id="ioConfirm" onclick="importData()">確認匯入</button>
      <p class="muted mt" id="ioMsg"></p>
    </div>

    <div class="card mt">
      <h2>🔧 語音診斷</h2>
      <p class="muted" style="margin-bottom:8px">若遇到無聲：①先檢查控制中心的靜音 🔕 與媒體音量（音效受靜音鍵管、語音不受，兩者症狀不同）②按「測試發音」「測試音效」分開檢查 ③按「顯示紀錄」把內容複製或截圖給 Claude。若麥克風每次都重新詢問：到網址列的網站設定選單，把麥克風權限改成「允許」即可一勞永逸。</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn ghost sm" onclick="ttsTest()">🔊 測試發音</button>
        <button class="btn ghost sm" onclick="ac();audioKick();sfx.win()">🎵 測試音效</button>
        <button class="btn ghost sm" onclick="ttsShow()">顯示語音紀錄</button>
      </div>
      <textarea id="ttsBox" class="mt hid" readonly></textarea>
    </div>`;
}
function ttsTest(){speak('Hello! Testing one two three.');setTimeout(ttsShow,1500);}
function ttsShow(){
  const b=el('ttsBox'); if(!b)return; b.classList.remove('hid');
  try{
    const a=JSON.parse(localStorage.getItem(TTSLOG_KEY)||'[]');
    b.value='音效引擎狀態：'+(AC?AC.state:'未啟動')+'\n'
      +(a.slice(-20).reverse().map(e=>`${e.t} ${e.ev} [voices:${e.v} paused:${e.p} speaking:${e.s}] ${e.txt}`).join('\n')||'（還沒有紀錄）');
  }catch(e){b.value='讀取失敗';}
}
function saveMottos(){
  const raw=el('mottoTxt').value||'';
  db.mottos=raw.split('\n').map(s=>s.trim()).filter(Boolean);
  save();
  el('mottoMsg').textContent=db.mottos.length?('已存 '+db.mottos.length+' 句悄悄話，會混進首頁的加油語裡 💛'):'目前沒有自訂悄悄話，首頁會用內建的加油語。';
  sfx.ok();
}
function importWords(){
  const raw=el('impTxt').value||'';
  const tier=el('impTier').value;
  const found=raw.match(/[A-Za-z][A-Za-z']*/g)||[];
  const have={}; allWords().forEach(x=>have[x.w.toLowerCase()]=1);
  const added=[];
  found.forEach(w=>{const k=w.toLowerCase();
    if(!have[k]){have[k]=1;db.custom.push({w:w===w.toUpperCase()?w:k==='america'?'America':k,zh:'',s:'',tier,batch:'手動新增 '+today()});added.push(k);}});
  save();
  el('impMsg').textContent=added.length?('已新增 '+added.length+' 個字（'+TIER_ZH[tier]+'）：'+added.join(', ')):'沒有新的字（可能都已存在）。';
  if(added.length)sfx.ok();
}
function exportData(){
  const box=el('ioBox');box.classList.remove('hid');el('ioConfirm').classList.add('hid');
  box.value=JSON.stringify(db);box.select();
  el('ioMsg').textContent='已產生備份文字，全選複製後保存（訊息、備忘錄皆可）。';
}
function importDataUI(){
  const box=el('ioBox');box.classList.remove('hid');box.value='';
  el('ioConfirm').classList.remove('hid');
  el('ioMsg').textContent='貼上備份文字後按「確認匯入」。會覆蓋此裝置目前的進度。';
}
function importData(){
  try{
    const d=JSON.parse(el('ioBox').value);
    if(!d||!d.progress||!d.stats)throw 0;
    db=Object.assign(fresh(),d);save();setHeader();
    el('ioMsg').textContent='匯入成功！';sfx.ok();
  }catch(e){el('ioMsg').textContent='匯入失敗：格式不正確，請確認貼的是完整備份文字。';}
}
function resetAll(){
  if(!confirm('確定要清除所有進度與新增的單字嗎？'))return;
  if(!confirm('真的確定？此動作無法復原。'))return;
  db=fresh();save();go('par');
}

/* ================= 啟動 ================= */
document.addEventListener('touchstart',function once(){ac();audioKick();document.removeEventListener('touchstart',once);},{passive:true});
if(TEST){const tb=document.createElement('div');tb.className='testbar';
  tb.textContent='🧪 測試模式：資料完全獨立，不會影響正式紀錄';
  el('app').prepend(tb);}
go('home');
</script>
</body>
</html>
